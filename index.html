<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Mejor Amiga - Peonías</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="message-top">Para mi hermosa Selene...</div>
        
        <div class="bouquet">
            <!-- Flower 1 (Center) -->
            <div class="flower-container flower-center">
                <div class="peony"></div>
            </div>
            <!-- Flower 2 -->
            <div class="flower-container flower-top-left">
                <div class="peony"></div>
            </div>
            <!-- Flower 3 -->
            <div class="flower-container flower-top-right">
                <div class="peony"></div>
            </div>
            <!-- Flower 4 -->
            <div class="flower-container flower-bottom-left">
                <div class="peony"></div>
            </div>
            <!-- Flower 5 -->
            <div class="flower-container flower-bottom-right">
                <div class="peony"></div>
            </div>
            
            <!-- Leaves peeking out from the bouquet -->
            <div class="leaf bouquet-leaf leaf-1"></div>
            <div class="leaf bouquet-leaf leaf-2"></div>
            <div class="leaf bouquet-leaf leaf-3"></div>
            <div class="leaf bouquet-leaf leaf-4"></div>
        </div>

        <div class="message-bottom">
            Eres la mejor amiga del mundo, mi pequeño Poio. ¡Te amo muchísimo! 🐣❤️
            <div class="tap-hint">👆 Toca la pantalla para la música 🎵</div>
        </div>
    </div>
    
    <!-- Using the mp4 directly as an audio source -->
    <audio id="bg-music" loop>
        <source src="WhatsApp Video 2026-07-13 at 4.03.01 PM.mp4" type="audio/mp4">
        Tu navegador no soporta el elemento de audio.
    </audio>

    <script src="script.js"></script>
</body>
</html>
